<!DOCTYPE html>
<html>
<head>
    <title>TechCart Shopping Cart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hero-section">
    <h1>TechCart</h1>
    <p>Shopping Cart using JavaScript Array Methods & Random Function</p>
</div>

<div class="container my-4">

    <div class="control-box">
        <button class="btn btn-dark" onclick="shuffleProducts()">Shuffle Random 10</button>

        <select id="filterOption" class="form-select filter-select">
            <option value="">Filter Products</option>
            <option value="low">Price Low to High</option>
            <option value="high">Price High to Low</option>
            <option value="under5000">Under ₹5000</option>
            <option value="above10000">Above ₹10000</option>
        </select>
    </div>

    <p class="text-center text-muted mt-3">
        Press <b>Ctrl + R</b> to shuffle products instead of refreshing page
    </p>

    <div class="row mt-4">

        <div class="col-lg-9">
            <div class="row" id="productBox"></div>
        </div>

        <div class="col-lg-3">
            <div class="cart-box">
                <h4>Your Cart 🛒</h4>
                <p>Total Items: <span id="cartCount">0</span></p>
                <h5>Total: ₹<span id="totalPrice">0</span></h5>
                <ul id="cartList" class="list-group mt-3"></ul>
            </div>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
